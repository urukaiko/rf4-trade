# ============================================================
# Docker Compose — Prod overlay
# ============================================================
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ============================================================

services:
  # ---------- App: pull from registry, no local build ----------
  app:
    image: ghcr.io/${GITHUB_REPO:?GITHUB_REPO is required}:latest
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M

  # ---------- DB: no external port — internal only ----------
  db:
    # No ports exposed — DB is only accessible within the internal network

  # ---------- Caddy reverse proxy ----------
  caddy:
    image: caddy:2-alpine
    container_name: rf4-trade-caddy
    environment:
      - DOMAIN=${DOMAIN:?DOMAIN is required in production}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
