# ============================================================
# Docker Compose — Base configuration (shared between dev & prod)
# ============================================================
# Dev:  docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# Prod: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ============================================================

name: rf4-trade

services:
  # ---------- SvelteKit application (Bun) ----------
  app:
    image: rf4-trade
    build:
      context: .
      args:
        BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?Required}
        BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
        VITE_BETTER_AUTH_URL: ${VITE_BETTER_AUTH_URL:-http://localhost:3000}
        DATABASE_URL: postgresql://build:build@placeholder:5432/placeholder
    container_name: rf4-trade
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-rf4user}:${POSTGRES_PASSWORD:?Required}@db:5432/${POSTGRES_DB:-rf4trade}
      - PORT=3000
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:?Required}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:-http://localhost:3000}
      - VITE_BETTER_AUTH_URL=${VITE_BETTER_AUTH_URL:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

  # ---------- PostgreSQL 16 ----------
  db:
    image: postgres:16-alpine
    container_name: rf4-trade-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rf4user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Required}
      POSTGRES_DB: ${POSTGRES_DB:-rf4trade}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rf4user} -d ${POSTGRES_DB:-rf4trade}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

# Internal network — all services communicate here
networks:
  internal:

# Named volumes
volumes:
  pgdata: