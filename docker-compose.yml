# ============================================================
# Docker Compose — SvelteKit (Bun) + PostgreSQL 16 behind Caddy
# ============================================================
#  docker compose up --build   →  http://localhost
# ============================================================

services:
  # ---------- SvelteKit application (Bun) ----------
  app:
    build:
      context: .
      args:
        BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?Required}
        BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
        VITE_BETTER_AUTH_URL: ${VITE_BETTER_AUTH_URL:-http://localhost:3000}
        DATABASE_URL: postgresql://build:build@placeholder:5432/placeholder
    ports:
      - "3000:3000"
    container_name: rf4-trade
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-rf4user}:${POSTGRES_PASSWORD:-rf4pass}@db:5432/${POSTGRES_DB:-rf4trade}
      - PORT=3000
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:?Required}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:-http://localhost:3000}
      - VITE_BETTER_AUTH_URL=${VITE_BETTER_AUTH_URL:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

  # ---------- PostgreSQL 16 ----------
  db:
    image: postgres:16-alpine
    container_name: rf4-trade-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rf4user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Database password required}
      POSTGRES_DB: ${POSTGRES_DB:-rf4trade}
    command: ["postgres", "-c", "wal_level=logical"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Exposed for dev only — comment out in production
    ports:
      - "5432:5432"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rf4user} -d ${POSTGRES_DB:-rf4trade}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------- Caddy reverse proxy ----------
  caddy:
    image: caddy:2-alpine
    container_name: rf4-trade-caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - internal
    restart: unless-stopped

# Internal network — all three services communicate here
networks:
  internal:

# Named volumes
volumes:
  pgdata:
  caddy_data:
  caddy_config:
