# ============================================================
# CI/CD Pipeline — Build, Push & Deploy
# ============================================================
# Triggers on every push to main:
#   builds Docker image, pushes to ghcr.io, deploys to VPS.
#
# TODO: Uncomment check and test jobs when type errors and
# tests are fixed. Remove needs and if override from build.
# ============================================================

name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
