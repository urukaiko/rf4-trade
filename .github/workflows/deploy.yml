  # ==========================================================
  # Job 3: Build & Push Docker Image
  # ==========================================================
  build:
    name: Build & Push Image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BETTER_AUTH_SECRET=build-time-placeholder-not-used-at-runtime
            BETTER_AUTH_URL=http://localhost:3000
            VITE_BETTER_AUTH_URL=http://localhost:3000

  # ==========================================================
  # Job 4: Deploy to VPS
  # ==========================================================
  deploy:
    name: Deploy to VPS
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 2222
          script: |
            set -euo pipefail
            cd /opt/rf4-trade

            # 1. Update config files from repository
            git fetch origin main
            git reset --hard origin/main

            # 2. Log in to GitHub Container Registry
            echo "${{ secrets.CR_PAT }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # 3. Pull latest image from registry
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull app

            # 4. Run database migrations from the container image
            docker compose -f docker-compose.yml -f docker-compose.prod.yml run --rm app bun run db:migrate

            # 5. Restart app — wait for healthy state
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --wait app

            # 6. Remove all unused images (never --volumes)
            docker image prune -a -f

            echo "Deploy complete: $(date -u)"
